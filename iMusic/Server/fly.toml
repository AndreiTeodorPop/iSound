# fly.toml app configuration file generated for imusic on 2026-04-20T11:36:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'imusic'
primary_region = 'ams'

[build]

[env]
  WORKERS = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
